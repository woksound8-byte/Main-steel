<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Operacional Mobile</title>

<style>
/* ===== BODY ===== */
body{
    font-family: Arial, sans-serif;
    background: #dff5e1; /* VERDE CLARO */
    margin: 0;
    padding: 10px;
}

/* ===== CABEÇALHOS ===== */
h1{
    text-align: center;
    color: #1b4332;
    margin-bottom: 20px;
}
h2{
    border-bottom: 2px solid #cce3d4;
    padding-bottom: 5px;
    color: #2d6a4f;
    font-size: 20px;
    margin-top: 0;
}
h3{
    color: #40916c;
    font-size: 18px;
    margin-bottom: 5px;
}

/* ===== INPUTS E SELECTS ===== */
input, select{
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #b7e4c7;
    font-size: 16px;
    box-sizing: border-box;
}

/* ===== BOTÕES ===== */
button{
    background: #2d6a4f;
    color: #fff;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.3s;
}
button:hover{
    background: #1b4332;
}
button.delete-btn{
    background: #d00000;
    padding: 6px 10px;
    border-radius: 6px;
    width: auto;
}
button.delete-btn:hover{
    background: #9d0208;
}

/* ===== CONTAINERS ===== */
div.container{
    background: #ffffff; /* CONTÊINER BRANCO */
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.08);
}

/* ===== LISTAS ===== */
.lista{
    background: #f8fff9;
    border: 1px solid #d8f3dc;
    max-height: 250px;
    overflow-y: auto;
    border-radius: 8px;
    padding: 10px;
}
.log-item{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    border-bottom: 1px solid #e9f5ec;
    transition: background 0.2s;
}
.log-item span{
    cursor: pointer;
}
.log-item:hover{
    background: #edfdf1;
}

/* ===== QR ===== */
#qr-reader{
    width: 100%;
    margin: 10px 0;
    border: 1px solid #b7e4c7;
    border-radius: 8px;
    display: none;
}
</style>
</head>

<body>

<h1>Controle Operacional</h1>

<div class="container">
<h2>Motoristas</h2>
<input type="text" id="motoristaInput" placeholder="Nome do motorista">
<button onclick="addMotorista()">Adicionar</button>
<div id="listaMotoristas" class="lista"></div>
</div>

<div class="container">
<h2>Carregamentos</h2>
<select id="motoristaSelect"></select>
<input type="text" id="bobinaInput" placeholder="Código da bobina ou QR">
<button onclick="addBobina()">Adicionar Bobina</button>
<div id="listaBobinas" class="lista"></div>
<button onclick="finalizarCarregamento()">Finalizar Carregamento</button>

<h3>Leitura QR / Código de Barras</h3>
<button onclick="toggleCamera()">Abrir / Fechar Câmera</button>
<div id="qr-reader"></div>
</div>

<div class="container">
<h2>Logs</h2>
<select id="filtroMotorista" onchange="atualizarLogs()">
<option value="">Todos os motoristas</option>
</select>
<div id="listaLogs" class="lista"></div>
</div>

<div class="container">
<h2>📊 Movimentação</h2>
<h3>🚚 Carregamentos</h3>
<p>Hoje: <strong id="carHoje">0</strong></p>
<p>Ontem: <strong id="carOntem">0</strong></p>
<p>Anteontem: <strong id="carAnteontem">0</strong></p>

<h3>📦 Bobinas</h3>
<p>Hoje: <strong id="bobHoje">0</strong></p>
<p>Ontem: <strong id="bobOntem">0</strong></p>
<p>Anteontem: <strong id="bobAnteontem">0</strong></p>
</div>

<div class="container">
<h2>Administração</h2>
<button onclick="resetarDadosProtegido()">Resetar Dados</button>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
/* LÓGICA ORIGINAL CONTINUA EXATAMENTE IGUAL */
let estado={motoristas:[],carregamentos:[]};
let bobinasTemp=[];
let editandoIndex=null;
let html5QrCode=null;
let camAberta=false;

function salvar(){localStorage.setItem("controleOperacional",JSON.stringify(estado))}
function carregar(){const dados=localStorage.getItem("controleOperacional");if(dados) estado=JSON.parse(dados)}
function formatarDataHora(dataISO){const d=new Date(dataISO);const data=d.toLocaleDateString("pt-BR");const hora=d.toLocaleTimeString("pt-BR",{hour:'2-digit',minute:'2-digit'});return {data,hora};}
function formatarData(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');}
function extrairCodigo(input){try{let url=new URL(input);return (url.searchParams.get("pO")||input).trim().toUpperCase();}catch{return input.trim().toUpperCase();}}

/* resto da lógica permanece igual */
</script>

</body>
</html>
