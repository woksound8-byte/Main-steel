<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackOps - Controle Operacional</title>
<style>
body{font-family:"Segoe UI",Arial,sans-serif;background:#111;margin:0;padding:12px;color:#EAEAEA;}
h1{text-align:center;font-weight:600;letter-spacing:1px;margin-bottom:25px;}
h2{border-bottom:1px solid #2A2A2A;padding-bottom:6px;margin-bottom:15px;font-size:18px;color:#8BC34A;text-transform:uppercase;}
h3{color:#BDBDBD;font-size:15px;margin-bottom:8px;}
input,select{width:100%;padding:10px;margin:8px 0;background:#1A1A1A;border:1px solid #2A2A2A;color:#EAEAEA;font-size:15px;border-radius:4px;box-sizing:border-box;}
input:focus,select:focus{outline:none;border-color:#2D6A4F;}
button{background:#2D6A4F;color:#fff;border:1px solid #2D6A4F;padding:8px 14px;margin-top:6px;cursor:pointer;font-size:14px;border-radius:4px;text-transform:uppercase;}
button:hover{background:#1B4332;}
button.delete-btn{background:#7A1E1E;border:1px solid #7A1E1E;padding:4px 8px;font-size:12px;border-radius:3px;width:auto;}
button.delete-btn:hover{background:#5A1414;}
div.container{background:#1A1A1A;padding:15px;margin-bottom:20px;border:1px solid #2A2A2A;border-radius:4px;}
.lista{background:#141414;border:1px solid #2A2A2A;max-height:250px;overflow-y:auto;padding:5px;}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-bottom:1px solid #222;font-size:14px;}
.log-item:last-child{border-bottom:none;}
#qr-reader{width:100%;margin:10px 0;border:1px solid #2A2A2A;display:none;}
#loginContainer{max-width:300px;margin:50px auto;}
.flex-row{display:flex;align-items:center;}
.flex-row input{margin-right:5px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginContainer">
<h1>Login Operador</h1>
<input type="text" id="loginNome" placeholder="Nome completo">
<input type="text" id="loginCPF" placeholder="CPF (somente números)">
<button onclick="fazerLogin()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<h1>Controle Operacional</h1>

<!-- Motoristas -->
<div class="container" id="motoristasContainer">
  <h2>
    Motoristas
    <button onclick="toggleMotoristas()" style="float:right;width:24px;height:24px;border:none;border-radius:50%;font-weight:bold;line-height:20px;text-align:center;padding:0;">-</button>
  </h2>
  <div id="motoristasContent" style="overflow:hidden;transition:max-height 0.3s ease;max-height:500px;">
    <input type="text" id="motoristaInput" placeholder="Nome do motorista">
    <button onclick="addMotorista()">Adicionar</button>
    <div id="listaMotoristas" class="lista"></div>
  </div>
</div>

<!-- BOBINAS -->
<div class="container">
<h2>Carregamentos</h2>
<select id="motoristaSelect"></select>
<input type="text" id="bobinaInput" placeholder="Código da bobina ou QR (use vírgula para múltiplos)" onfocus="campoAtivo=this">
<button onclick="addBobina()">Adicionar Bobina(s)</button>
<div id="listaBobinas" class="lista"></div>
<button onclick="finalizarCarregamento()">Finalizar Carregamento</button>

<h3>Leitura QR / Código de Barras</h3>
<button onclick="toggleCamera()">Abrir / Fechar Câmera</button>
<div id="qr-reader"></div>
</div>

<!-- LOGS -->
<div class="container">
<h2>Logs</h2>
<input type="date" id="dataExportacao">
<button onclick="exportarLogsPorDia()">Exportar Logs do Dia (TXT)</button>
<button onclick="compartilharLogs()">Compartilhar Logs</button>
<select id="filtroMotorista" onchange="atualizarLogs()">
<option value="">Todos os motoristas</option>
</select>
<div id="listaLogs" class="lista"></div>
</div>

<!-- MOVIMENTAÇÃO -->
<div class="container">
<h2>Movimentação</h2>
<h3>Carregamentos</h3>
<p>Hoje: <strong id="carHoje">0</strong></p>
<p>Ontem: <strong id="carOntem">0</strong></p>
<p>Anteontem: <strong id="carAnteontem">0</strong></p>
<h3>Bobinas</h3>
<p>Hoje: <strong id="bobHoje">0</strong></p>
<p>Ontem: <strong id="bobOntem">0</strong></p>
<p>Anteontem: <strong id="bobAnteontem">0</strong></p>
</div>

<!-- ADMINISTRAÇÃO -->
<div class="container">
<h2>Administração</h2>
<button onclick="resetarDadosProtegido()">Resetar Dados (Senha 1234)</button>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
let estado={motoristas:[],carregamentos:[]};
let bobinasTemp=[];
let editandoIndex=null;
let html5QrCode=null;
let camAberta=false;
let operador={nome:'',cpf:''};
let campoAtivo=null;

/* ===== LOGIN ===== */
function fazerLogin(){
    const nome=document.getElementById("loginNome").value.trim();
    const cpf=document.getElementById("loginCPF").value.trim();
    if(!nome||!cpf) return alert("Informe nome e CPF!");
    operador={nome,cpf};
    try{
        const dadosUsuario = localStorage.getItem(`user_${cpf}`);
        estado = dadosUsuario ? JSON.parse(dadosUsuario) : {motoristas:[],carregamentos:[]};
    }catch(e){estado={motoristas:[],carregamentos:[]};}
    document.getElementById("loginContainer").style.display="none";
    document.getElementById("app").style.display="block";
    atualizarTudo();
}

/* ===== SALVAR ===== */
function salvar(){if(!operador.cpf) return; localStorage.setItem(`user_${operador.cpf}`,JSON.stringify(estado));}
function formatarDataHora(dataISO){const d=new Date(dataISO); return {data:d.toLocaleDateString("pt-BR"), hora:d.toLocaleTimeString("pt-BR",{hour:'2-digit',minute:'2-digit'})};}
function formatarData(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');}
function extrairCodigo(input){try{let url=new URL(input);return (url.searchParams.get("pO")||input).trim().toUpperCase();}catch{return input.trim().toUpperCase();}}

/* ===== MOTORISTAS ===== */
function addMotorista(){const nome=document.getElementById("motoristaInput").value.trim();if(!nome)return alert("Digite nome válido.");if(estado.motoristas.includes(nome))return alert("Motorista já existe.");estado.motoristas.push(nome);document.getElementById("motoristaInput").value="";salvar();atualizarTudo();}
function excluirMotorista(nome){if(estado.carregamentos.some(c=>c.motorista===nome))return alert("Motorista possui carregamentos.");if(!confirm("Excluir motorista?"))return;estado.motoristas=estado.motoristas.filter(m=>m!==nome);salvar();atualizarTudo();}
function atualizarMotoristasUI(){const lista=document.getElementById("listaMotoristas"),select=document.getElementById("motoristaSelect"),filtro=document.getElementById("filtroMotorista");lista.innerHTML="";select.innerHTML="";filtro.innerHTML='<option value="">Todos os motoristas</option>';estado.motoristas.forEach(m=>{lista.innerHTML+=`<div class="log-item"><span>${m}</span><button class="delete-btn" onclick="excluirMotorista('${m}')">X</button></div>`;select.innerHTML+=`<option value="${m}">${m}</option>`;filtro.innerHTML+=`<option value="${m}">${m}</option>`;});}

/* ===== BOBINAS ===== */
function addBobina(){
    let input=campoAtivo||document.getElementById("bobinaInput");
    let valor=input.value.trim();
    if(!valor) return alert("Digite código válido.");
    const entradas=valor.split(",").map(c=>extrairCodigo(c.trim())).filter(c=>c);
    entradas.forEach(codigo=>{
        if(!bobinasTemp.some(b=>b.codigo===codigo)) bobinasTemp.push({codigo,lote:"",obs:""});
    });
    input.value="";
    atualizarBobinasUI();
}

function atualizarBobinasUI(){
    const lista=document.getElementById("listaBobinas");
    lista.innerHTML="";
    bobinasTemp.forEach((b,i)=>{
        lista.innerHTML+=`
        <div class="log-item flex-row">
            <input type="text" placeholder="Código" value="${b.codigo}" style="flex:1" onfocus="campoAtivo=this" readonly>
            <input type="text" placeholder="Lote" value="${b.lote}" style="width:80px;margin-left:5px" onchange="bobinasTemp[${i}].lote=this.value" onfocus="campoAtivo=this">
            <input type="text" placeholder="Obs" value="${b.obs}" style="flex:1;margin-left:5px" onchange="bobinasTemp[${i}].obs=this.value" onfocus="campoAtivo=this">
            <button class="delete-btn" onclick="removerBobinaTemp(${i})">X</button>
        </div>`;
    });
}
function removerBobinaTemp(i){bobinasTemp.splice(i,1);atualizarBobinasUI();}

/* ===== CARREGAMENTOS ===== */
function finalizarCarregamento(){
    if(!document.getElementById("motoristaSelect").value) return alert("Selecione motorista.");
    if(bobinasTemp.length===0) return alert("Adicione bobinas.");
    const registro={motorista:document.getElementById("motoristaSelect").value,data:new Date().toISOString(),bobinas:[...bobinasTemp],operador:{...operador}};
    if(editandoIndex!==null){estado.carregamentos[editandoIndex]=registro;editandoIndex=null;} 
    else{estado.carregamentos.push(registro);}
    bobinasTemp=[];
    salvar();
    atualizarTudo();
}

/* ===== LOGS ===== */
function atualizarLogs(){
    const lista=document.getElementById("listaLogs");
    const filtro=document.getElementById("filtroMotorista").value;
    lista.innerHTML="";
    let filtrados = estado.carregamentos;
    if(filtro) filtrados=filtrados.filter(c=>c.motorista===filtro);
    filtrados.forEach((c,i)=>{
        const {data,hora}=formatarDataHora(c.data);
        lista.innerHTML+=`<div class="log-item"><span style="flex:1;cursor:pointer" onclick="abrirCarregamento(${i})">${i+1}º | ${c.motorista} | ${c.bobinas.map(b=>b.codigo).join(", ")} | ${data} ${hora}</span><button class="delete-btn" onclick="excluirCarregamento(${i})">X</button></div>`;
    });
}

/* ===== ABRIR / EXCLUIR CARREGAMENTO ===== */
function abrirCarregamento(i){editandoIndex=i; bobinasTemp=[...estado.carregamentos[i].bobinas]; document.getElementById("motoristaSelect").value=estado.carregamentos[i].motorista; atualizarBobinasUI();}
function excluirCarregamento(i){if(!confirm("Excluir carregamento?"))return;estado.carregamentos.splice(i,1);salvar();atualizarTudo();}

/* ===== PAINEL ===== */
function atualizarPainel(){
    const hoje=new Date(),ontem=new Date(),anteontem=new Date();
    ontem.setDate(hoje.getDate()-1);anteontem.setDate(hoje.getDate()-2);
    function contar(d){
        const chave=formatarData(d);
        let car=0,bob=0;
        estado.carregamentos.forEach(c=>{if(formatarData(new Date(c.data))===chave){car++;bob+=c.bobinas.length;}});
        return {car,bob};
    }
    let h=contar(hoje),o=contar(ontem),a=contar(anteontem);
    carHoje.innerText=h.car;carOntem.innerText=o.car;carAnteontem.innerText=a.car;
    bobHoje.innerText=h.bob;bobOntem.innerText=o.bob;bobAnteontem.innerText=a.bob;
}

/* ===== QR ===== */
function iniciarQR(){
    if(!html5QrCode) html5QrCode=new Html5Qrcode("qr-reader");
    html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:250},msg=>{
        const codigo = extrairCodigo(msg);
        if(campoAtivo){
            let valores = campoAtivo.value.split(",").map(v=>v.trim()).filter(v=>v);
            if(!valores.includes(codigo)) valores.push(codigo);
            campoAtivo.value = valores.join(", ");
            campoAtivo.onchange?.();
        }
    });
}
function toggleCamera(){const reader=document.getElementById("qr-reader");if(camAberta){html5QrCode.stop().then(()=>{reader.style.display="none";camAberta=false});}else{reader.style.display="block";iniciarQR();camAberta=true;}}

/* ===== RESET ===== */
function resetarDadosProtegido(){const senha=prompt("Senha:");if(senha!=="1234") return alert("Senha incorreta."); localStorage.removeItem(`user_${operador.cpf}`); estado={motoristas:[],carregamentos:[]}; bobinasTemp=[]; editandoIndex=null; atualizarTudo();}

/* ===== MOTORISTAS MINIMIZÁVEL ===== */
function toggleMotoristas(){const content=document.getElementById("motoristasContent"); const btn=content.previousElementSibling.querySelector("button"); if(content.style.maxHeight===""||content.style.maxHeight==="0px"){content.style.maxHeight=content.scrollHeight+"px";btn.innerText="-";} else{content.style.maxHeight="0px";btn.innerText="+";}}

/* ===== EXPORTAR / COMPARTILHAR LOGS ===== */
function exportarLogsPorDia(){
    const dataSelecionada=document.getElementById("dataExportacao").value;
    if(!dataSelecionada) return alert("Selecione uma data.");
    const logs=estado.carregamentos.filter(c=>formatarData(new Date(c.data))===dataSelecionada);
    if(logs.length===0) return alert("Nenhum log encontrado.");
    let texto=`TRACKOPS - CONTROLE OPERACIONAL\nData: ${dataSelecionada}\nOperador: ${operador.nome}\nCPF: ${operador.cpf}\n------------------------------------\n\n`;
    logs.forEach((c,i)=>{
        const {data,hora}=formatarDataHora(c.data);
        texto+=`${i+1}º Registro\nMotorista: ${c.motorista}\nBobinas: ${c.bobinas.map(b=>b.codigo).join(", ")}`;
        c.bobinas.forEach(b=>{if(b.lote) texto+=`\nLote: ${b.lote}`; if(b.obs) texto+=`\nObs: ${b.obs}`;});
        texto+=`\nHorário: ${data} ${hora}\n------------------------------------\n\n`;
    });
    const blob=new Blob([texto],{type:"text/plain;charset=utf-8"}); const link=document.createElement("a"); link.href=URL.createObjectURL(blob); link.download=`logs_${dataSelecionada}.txt`; document.body.appendChild(link); link.click(); document.body.removeChild(link);
}
function compartilharLogs(){
    let logs=estado.carregamentos;
    const filtro=document.getElementById("filtroMotorista").value; if(filtro) logs=logs.filter(c=>c.motorista===filtro);
    if(logs.length===0) return alert("Nenhum log para compartilhar.");
    let texto=`TRACKOPS - CONTROLE OPERACIONAL\nOperador: ${operador.nome}\nCPF: ${operador.cpf}\n------------------------------------\n\n`;
    logs.forEach((c,i)=>{
        const {data,hora}=formatarDataHora(c.data);
        texto+=`${i+1}º Registro\nMotorista: ${c.motorista}\nBobinas: ${c.bobinas.map(b=>b.codigo).join(", ")}`;
        c.bobinas.forEach(b=>{if(b.lote) texto+=`\nLote: ${b.lote}`; if(b.obs) texto+=`\nObs: ${b.obs}`;});
        texto+=`\nHorário: ${data} ${hora}\n------------------------------------\n\n`;
    });
    if(navigator.share){navigator.share({title:"Logs TrackOps",text:texto}).then(()=>console.log("Compartilhamento concluído")).catch(err=>console.error(err));}else{alert("Seu navegador não suporta compartilhamento direto. Copie o texto:\n\n"+texto);}
}

function atualizarTudo(){atualizarMotoristasUI(); atualizarLogs(); atualizarBobinasUI(); atualizarPainel();}
</script>
</body>
</html>
